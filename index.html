<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHROMATIC DECAY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0E12; overflow: hidden; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    window.addEventListener('error', function(e) {
      var d = document.getElementById('err');
      if (!d) { d = document.createElement('div'); d.id = 'err';
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:rgba(200,0,40,0.92);color:#fff;font:13px monospace;padding:10px;z-index:9999;white-space:pre-wrap;word-break:break-all;';
        document.body.appendChild(d); }
      d.textContent += (e.message || e) + '\n  at ' + (e.filename||'') + ':' + (e.lineno||'') + '\n';
    });
  </script>
  <script type="module" src="src/game.js"></script>
</body>
</html>
